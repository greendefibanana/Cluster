                }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-4">
<!-- Farcaster Widget Container (3:2 Aspect Ratio) -->
<!-- Assuming base width of 600px for demonstration, yielding 400px height. Can scale with max-w. -->
<div class="relative w-full max-w-[600px] aspect-[3/2] rounded-xl overflow-hidden shadow-[0_4px_40px_-10px_rgba(164,230,255,0.06)] bg-surface-container-low border border-outline-variant/20 flex flex-col justify-between p-6">
<!-- Background Image/Texture -->
<div class="absolute inset-0 z-0 bg-cover opacity-60 mix-blend-luminosity" data-alt="Institutional-grade abstract background featuring isometric 3D vault blocks stacking up symmetrically. The lighting is a blend of soft cinematic blue and subtle warm gold accents, creating an atmosphere of safety and high-end financial technology. Clean, minimal geometric lines intersect across a dark, deep obsidian space. The mood is highly professional, secure, and transparent, aligning perfectly with a modern 'Kinetic Vault' dark-mode aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBa6UxXZVKS6ni3uZwp4rx01F3FCZb4UZ4K9530sxfkZL_RGMW9poXHR-JVUnKVJBdWsFg0mDXpl6NHjWNugBjlgUVSmj5TPF2wWRYkSxLOVZreSLHkOOOYynUx8ZbWcJ6hxmN5OPSvQHJVg9a08mH64cTABqTJgSUwLPDHOSK0vXH7xaTWRqiiwD-rpz3j5zVvPu74ExDlTga1eMKjCbA4msLAzFxOZ7JNmP43v62qib-3TwNaYQWTm9W2VHAsqHlevTra2baJ1-0'); background-position: center right;">
</div>
<!-- Gradient Overlay for depth -->
<div class="absolute inset-0 z-0 bg-background/60 backdrop-blur-[2px] shadow-inner"></div>
<!-- Header -->
<header class="relative z-10 flex justify-between items-start w-full">
<!-- Left: Avatar & Rank -->
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full overflow-hidden border border-outline-variant/30 shadow-[0_0_15px_-3px_rgba(164,230,255,0.3)]">
<img alt="Agent Avatar" class="w-full h-full object-cover" data-alt="A sleek, futuristic abstract digital avatar portrait inside a circle. The image features a high-tech, algorithmic face structure rendered in glowing neon cyan lines against a deep black background. It exudes an aura of artificial intelligence and quantitative analysis, fitting perfectly within a sophisticated dark-mode 'Kinetic Vault' theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCM-PU9nRfQZlzxxwjH_wyAUMlyz_wqMGkBYO5zorO3pMLKPlJOzVT02rGMTIFGrVXK2dKgSXSGR4Vl2jvcGjF_2QXsEFNTC_-yChATelFx_h5eos2uEhZRNkNPvwQX7EFNPMSsajPNRYvnJANkorahYLmIj2t-jlHTVZ5CWK6ChKPETQ016UcvCZa0gp0ft0iMTwGHlrOONvhYV_6ogM4Bee9K-GugYbWAni7fhCNAnlZq5ISTcchay1ScOfXPBFI6gWYbWNnHdq8"/>
</div>
<div class="flex flex-col">
<span class="font-headline font-bold text-on-surface text-lg leading-tight tracking-tight">Yield Agent Alpha</span>
<span class="font-label text-xs text-primary/80 uppercase tracking-widest">Rank: Quant</span>
</div>
</div>
<!-- Right: Badge -->
<div class="flex items-center bg-surface-container-highest/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-primary/20 shadow-[0_0_10px_-2px_rgba(164,230,255,0.1)]">
<span class="material-symbols-outlined text-primary text-[14px] mr-1" data-icon="bolt">bolt</span>
<span class="font-label text-xs font-semibold text-primary uppercase tracking-wider">Alpha Bridge: 1.5x</span>
</div>
</header>
<!-- Main Metric Center -->
<main class="relative z-10 flex flex-col items-center justify-center flex-grow w-full">
<h1 class="font-display font-extrabold text-5xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-[#FFD700] to-[#FFF099] drop-shadow-[0_0_20px_rgba(255,215,0,0.4)] tracking-tighter mb-2 drop-shadow-[0_0_30px_rgba(0,0,0,0.8)]">
                22.4%
            </h1>
<h2 class="font-label text-sm text-on-surface-variant uppercase tracking-widest opacity-80">APY (Net Yield)</h2>
</main>
<!-- Footer -->
<footer class="relative z-10 flex justify-between items-end w-full">
<!-- Bottom-Left: TVL -->
<div class="flex items-center gap-2 bg-surface-container/50 backdrop-blur-sm px-4 py-2 rounded-lg border border-outline-variant/15">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="shield">shield</span>
<div class="flex flex-col">
<span class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider">TVL</span>
<span class="font-headline font-bold text-on-surface text-base">$512K</span>
</div>
</div>
<!-- Bottom-Right: Suppliers -->
<div class="flex items-center gap-2 bg-surface-container/50 backdrop-blur-sm px-4 py-2 rounded-lg border border-outline-variant/15">
<div class="flex flex-col items-end">
<span class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider">Suppliers</span>
<span class="font-headline font-bold text-on-surface text-base">1.2K</span>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="hub">hub</span>
</div>
</footer>
</div>
</body></html>
